# gtp_human9d.cfg — 9d anchor of the Human-SL KGS-rank ladder (even-game parity vs rank_9d).
#
# This is the TOP rung (9d = 0 ELO) of the gtp_human<rank>.cfg ladder documented in
# docs/HumanSL_Rank_Ladder.md. It imitates a 9d player with the Human-SL net plus KataGo search.
#
# CALIBRATION (see docs/HumanSL_Rank_Ladder.md → Results):
#   candidate = preaz_9d @ 400 visits, humanSLChosenMovePiklLambda = 0.045
#   baseline  = rank_9d  @ 400 visits, humanSLChosenMovePiklLambda = 0.08  (a DIFFERENT profile)
#   measured  = 201/383 games = 52.5% = +17 ELO, 95% CI [-18, +52]  (statistically at parity)
#   method    = `katago tunehuman`, fixed-lambda bracket at 400v (see Reproduction)
# The ONLY change from cpp/configs/gtp_human9d_search_example.cfg is piklLambda 0.08 -> 0.045,
# which makes the preaz_9d profile match the rank_9d reference's strength. The lambda response is
# shallow near parity (~23 ELO per 0.01 lambda), so lambda in [0.04, 0.05] all sit within ~±25 ELO.
#
# Run requires the Human-SL model on the command line, e.g.:
# ./katago gtp -config gtp_human9d.cfg -model <katago_model>.bin.gz -human-model b18c384nbt-humanv0.bin.gz
# Human model: https://github.com/lightvector/KataGo/releases/tag/v1.15.0

logDir = gtp_logs
logAllGTPCommunication = true
logSearchInfo = true
logSearchInfoForChosenMove = false
logToStderr = false

rules = japanese

allowResignation = true
resignThreshold = -0.98
resignConsecTurns = 10
resignMinScoreDifference = 20
resignMinMovesPerBoardArea = 0.40

# Near-pro 9d needs the reference's full search; 1-visit play cannot match a 400-visit bot of the
# same model. To adjust strength, change humanSLChosenMovePiklLambda (below), not maxVisits.
maxVisits = 400

numSearchThreads = 8
lagBuffer = 1.0

delayMoveScale = 2.0
delayMoveMax = 10.0

# Imitate human amateur 9d players (roughly based on ~KGS ranks)
humanSLProfile = preaz_9d
humanSLChosenMoveProp = 1.0
humanSLChosenMoveIgnorePass = true

# Calibrated strength dial: 0.045 makes preaz_9d@400v match the rank_9d@400v reference (0 ELO).
# Higher -> more human / weaker; lower -> trusts KataGo search more / stronger.
# (Reference example ships 0.08; we lowered it to 0.045 to reach 9d parity with the rank_9d profile.)
humanSLChosenMovePiklLambda = 0.045

# Spend 80% of visits to explore humanSL moves so they get evaluations for humanSLChosenMovePiklLambda
humanSLRootExploreProbWeightless = 0.8
humanSLRootExploreProbWeightful = 0.0
humanSLPlaExploreProbWeightless = 0.0
humanSLPlaExploreProbWeightful = 0.0
humanSLOppExploreProbWeightless = 0.0
humanSLOppExploreProbWeightful = 0.0

humanSLCpuctExploration = 0.50
humanSLCpuctPermanent = 2.0

chosenMoveTemperatureEarly = 0.70
chosenMoveTemperature = 0.25
chosenMoveTemperatureHalflife = 30
chosenMoveTemperatureOnlyBelowProb = 1.0
chosenMoveSubtract = 0
chosenMovePrune = 0

nnCacheSizePowerOfTwo = 20
nnMutexPoolSizePowerOfTwo = 14

ignorePreRootHistory = false
analysisIgnorePreRootHistory = false

rootNumSymmetriesToSample = 2
useLcbForSelection = false

winLossUtilityFactor = 1.0
staticScoreUtilityFactor = 0.5
dynamicScoreUtilityFactor = 0.5

useUncertainty = false
subtreeValueBiasFactor = 0.0
useNoisePruning = false
